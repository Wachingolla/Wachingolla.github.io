<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Receiver</title>
    
    <link rel="stylesheet" href="css/receiver.css" media="screen" />
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
    <script src="js/receiver.js"></script>

</head>
<body>

    <cast-media-player></cast-media-player>

    <div id="idle-screen" class="active">
        <div class="logo-container">
            <div class="logo-image"></div>
        </div>
        <div class="status-pill">
            <span class="status-dot"></span>
            <span class="status-text" id="status-msg">Conectando...</span>
        </div>
        <div class="senders-info" id="senders-info">
            <span class="sender-count" id="sender-count"></span>
        </div>
    </div>

    <div id="toast"></div>

    <div id="loader-screen">
        <div class="spinner"></div>
    </div>

    <div id="debug-log">Initialize...</div>
</body>
</html>
