<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Receiver</title>
    
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <style>
        /* --- 2. GLOBAL STYLES & VARIABLES --- */
        :root {
            --primary-color: #00E5FF; /* Your Brand Color (Cyberpunk Teal) */
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-color);
        }

        /* --- 3. GOOGLE MEDIA PLAYER CUSTOMIZATION --- */
        cast-media-player {
            width: 100vw;
            height: 100vh;
            /* Hiding the default splash since we made a better one */
            --splash-image: none; 
            --splash-size: 0;
            --cast-media-player-progress-bar-color: var(--primary-color);
            --cast-media-player-seek-line-color: rgba(255, 255, 255, 0.3);
        }

        /* --- 4. IDLE / STANDBY SCREEN --- */
        #idle-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10; /* Above player */
            
            /* Smooth Transition Logic */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        #idle-screen.active {
            opacity: 1;
            visibility: visible;
        }

        /* Logo Area */
        .logo-container {
            margin-bottom: 40px;
            text-align: center;
        }
        
        .logo-text {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Status Indicator Pill */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass-bg);
            border: var(--glass-border);
            padding: 10px 24px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px; height: 8px;
            background-color: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--primary-color);
            animation: pulse 2s infinite;
        }

        .status-text {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.8;
        }

        /* --- 5. LOADING OVERLAY --- */
        #loader-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20; /* Above everything */
            
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        #loader-screen.active {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* --- 6. DEBUG OVERLAY (Optional - remove for production) --- */
        #debug-log {
            position: absolute;
            bottom: 20px; left: 20px;
            font-family: monospace;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            z-index: 9999;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <cast-media-player></cast-media-player>

    <div id="idle-screen" class="active">
        <div class="logo-container">
            <div class="logo-text">MY PLATFORM</div>
        </div>
        <div class="status-pill">
            <span class="status-dot"></span>
            <span class="status-text" id="status-msg">Ready to Cast</span>
        </div>
    </div>

    <div id="loader-screen">
        <div class="spinner"></div>
    </div>

    <div id="debug-log">Initialize...</div>

    <script>
        // --- 7. JAVASCRIPT LOGIC ---
        
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // UI References
        const idleScreen = document.getElementById('idle-screen');
        const loaderScreen = document.getElementById('loader-screen');
        const statusMsg = document.getElementById('status-msg');
        const debugLog = document.getElementById('debug-log');

        // Helper to update debug log
        function log(msg) {
            console.log(msg);
            debugLog.innerText = msg;
        }

        // --- STATE MANAGEMENT ---
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_STATE_CHANGED,
            (event) => {
                const state = event.value;
                log("State: " + state);

                switch(state) {
                    case cast.framework.events.PlayerState.IDLE:
                        // Show Idle Screen
                        idleScreen.classList.add('active');
                        loaderScreen.classList.remove('active');
                        statusMsg.innerText = "Ready to Cast";
                        break;

                    case cast.framework.events.PlayerState.BUFFERING:
                    case cast.framework.events.PlayerState.LOADING:
                        // Show Loader
                        idleScreen.classList.remove('active');
                        loaderScreen.classList.add('active');
                        break;

                    case cast.framework.events.PlayerState.PLAYING:
                        // Hide All Overlays -> Show Video
                        idleScreen.classList.remove('active');
                        loaderScreen.classList.remove('active');
                        break;

                    case cast.framework.events.PlayerState.PAUSED:
                        // Optional: You could show a "Paused" icon here
                        loaderScreen.classList.remove('active');
                        break;
                }
            }
        );

        // --- METADATA INTERCEPTOR ---
        // When Flutter sends a 'LOAD' request, update the UI text before playing
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            loadRequestData => {
                log("Loading Request Received");
                
                // If metadata exists, show "Loading [Title]..." on the idle screen
                if (loadRequestData.media && loadRequestData.media.metadata) {
                    statusMsg.innerText = "Loading: " + loadRequestData.media.metadata.title;
                }
                
                return loadRequestData;
            }
        );

        // --- START THE RECEIVER ---
        const options = new cast.framework.CastReceiverOptions();
        
        // PREVENT SLEEP: Keep the receiver alive for 1 hour without input
        options.maxInactivity = 3600; 

        context.start(options);
    </script>
</body>
</html>
